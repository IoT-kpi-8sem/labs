global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: store
    static_configs:
      - targets: ['store:3000']
    metrics_path: /metrics

  - job_name: hub
    static_configs:
      - targets: ['hub:8080']
    metrics_path: /metrics

  - job_name: edge
    static_configs:
      - targets: ['edge:9100']
    metrics_path: /metrics

  - job_name: agent
    static_configs:
      - targets: ['agent:9100']
    metrics_path: /metrics

  - job_name: mosquitto
    static_configs:
      - targets: ['mosquitto-exporter:9234']

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
